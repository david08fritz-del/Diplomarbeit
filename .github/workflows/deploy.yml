name: deploy

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spiel
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: spiel/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Pages-Artefakt zusammenstellen (Spiel als Unterordner, Root-Platzhalter)
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p _site/spiel
          cp -r spiel/dist/. _site/spiel/
          cp deploy/root-index.html _site/index.html
      - uses: actions/upload-pages-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
